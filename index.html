          <div style={{marginLeft:"auto",display:"flex",gap:8}}>
            <button onClick={onExport} style={{background:"#0a1e14",border:"1px solid #2a5a3a",color:"#5ada90",padding:"5px 12px",borderRadius:7,cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:10}}>⬇ Exportar</button>
            <button onClick={()=>fileRef.current.click()} style={{background:"#0a1428",border:"1px solid #2a4a7a",color:"#60a0e0",padding:"5px 12px",borderRadius:7,cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:10}}>⬆ Importar</button>
            <input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={e=>{if(e.target.files[0])onImport(e.target.files[0]);}}/>
            <button onClick={onClose} style={{background:"transparent",border:"none",color:"#305030",fontSize:20,cursor:"pointer"}}>✕</button>
          </div>
        </div>
        <div style={{padding:"12px 22px",borderBottom:"1px solid #0e1e0e"}}>
          <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar receita..."
            style={{background:"#091409",border:"1px solid #1c381c",color:"#a0da60",padding:"7px 12px",borderRadius:7,fontFamily:"'DM Mono',monospace",fontSize:12,width:"100%",outline:"none"}}/>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"12px 22px"}}>
          {filtered.length===0?(
            <div style={{textAlign:"center",padding:"48px 0",color:"#254525",fontSize:12}}>
              {recipes.length===0?"Nenhuma receita salva ainda.":"Nenhuma receita encontrada."}
            </div>
          ):filtered.sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt)).map(r=>{
            const activeCount=Object.values(r.grams||{}).filter(v=>parseFloat(v)>0).length;
            const isCocktail=r.mode==="cocktail";
            return(
              <div key={r.id} style={{background:"rgba(7,16,7,0.85)",border:"1px solid #162a16",borderRadius:10,padding:"12px 16px",marginBottom:8,display:"flex",alignItems:"center",gap:12}}>
                <div style={{fontSize:24}}>{isCocktail?"🍹":"🌿"}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,color:"#90c860",fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.name}</div>
                  <div style={{fontSize:9,color:"#305030",marginTop:2}}>
                    {activeCount} ingrediente{activeCount!==1?"s":""} · {isCocktail?"Coquetel":"Gin"} · {fmt(r.updatedAt)}
                  </div>
                  <div style={{fontSize:9,color:"#1e3e1e",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    {Object.entries(r.grams||{}).filter(([,v])=>parseFloat(v)>0).slice(0,5).map(([b,v])=>`${b} ${v}g/L`).join(" · ")}
                  </div>
                </div>
                <div style={{display:"flex",gap:6,flexShrink:0}}>
                  <button onClick={()=>onLoad(r)}
                    style={{background:"linear-gradient(135deg,#1c4a0c,#12300a)",border:"1px solid #3a7a1a",color:"#a0da60",padding:"6px 14px",borderRadius:7,cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:10}}>
                    ▶ Abrir
                  </button>
                  <button onClick={()=>{if(window.confirm("Remover ""+r.name+""?"))onDelete(r.id);}}
                    style={{background:"#1a0808",border:"1px solid #4a1818",color:"#c06060",padding:"6px 10px",borderRadius:7,cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:10}}>
                    ✕
                  </button>
                </div>
              </div>
            );
          })}
        </div>
        <div style={{padding:"12px 22px",borderTop:"1px solid #142214",fontSize:9,color:"#1e3e1e",textAlign:"center"}}>
          Para sincronizar entre dispositivos: exporte o JSON e commite como recipes.json no seu repositório GitHub
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App(){
  const [step,setStep]=useState("input");
  const [mode,setMode]=useState("gin"); // "gin" | "cocktail"
  const [search,setSearch]=useState("");
  const [activeCat,setActiveCat]=useState("Todos");
  const [showAll,setShowAll]=useState(false);
  const [showStockModal,setShowStockModal]=useState(false);
  const [showAdminModal,setShowAdminModal]=useState(false);
  const [stock,setStock]=useState({});
  const [customDB,setCustomDB]=useState({});
  const [stockLoaded,setStockLoaded]=useState(false);
  const [updateBanner,setUpdateBanner]=useState(null);
  // Brix/pH per ingredient — only for Frutas/Cítricos/Flores in cocktail mode
  const [fruitParams,setFruitParams]=useState({}); // { [botName]: { brix: "", ph: "" } }
  const [grams,setGrams]=useState(()=>Object.fromEntries(Object.keys(BOTANICALS_DB).map(k=>[k,""])));
  const [results,setResults]=useState(null);
  const [recipeName,setRecipeName]=useState("");
  const [savedRecipes,setSavedRecipes]=useState([]);
  const [showRecipeManager,setShowRecipeManager]=useState(false);
  const [showPdfModal,setShowPdfModal]=useState(false);

  // ── GitHub auto-update config ────────────────────────────────────────────────────────────
  // Aponte para o arquivo botanicals.json no seu repositório GitHub
  // Exemplo: "https://raw.githubusercontent.com/SEU_USER/gin-lab/main/botanicals.json"
  // Deixe "" para desabilitar
  const GITHUB_RAW_URL = "";

  useEffect(()=>{
    (async()=>{
      try{const r=await window.storage.get("gin_stock");if(r&&r.value)setStock(JSON.parse(r.value));}catch(e){}
      try{const r=await window.storage.get("gin_custom_db");if(r&&r.value)setCustomDB(JSON.parse(r.value));}catch(e){}
      try{const r=await window.storage.get("gin_recipes");if(r&&r.value)setSavedRecipes(JSON.parse(r.value));}catch(e){}
      setStockLoaded(true);
    })();
  },[]);

  // ── Check GitHub silently on mount ───────────────────────────────────────────────────────
  useEffect(()=>{
    if(!GITHUB_RAW_URL) return;
    (async()=>{
      try {
        const res = await fetch(GITHUB_RAW_URL+"?t="+Date.now());
        if(!res.ok) return;
        const data = await res.json();
        if(!data.botanicals||!data.version) return;
        let savedVer = DB_VERSION;
        try{const r=await window.storage.get("gin_remote_db_version");if(r?.value)savedVer=r.value;}catch(e){}
        if(data.version !== savedVer){
          const newBots=Object.keys(data.botanicals).filter(n=>!BOTANICALS_DB[n]);
          setUpdateBanner({version:data.version,count:newBots.length,total:Object.keys(data.botanicals).length,data,notes:data.releaseNotes||""});
        }
      } catch(e){}
    })();
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[]);

  const applyGithubUpdate=useCallback(async(updateData)=>{
    const newCustom={...customDB};
    Object.entries(updateData.botanicals).forEach(([name,d])=>{
      if(!BOTANICALS_DB[name]) newCustom[name]={inStock:false,hasReport:false,compounds:{},botData:d};
    });
    setCustomDB(newCustom);
    try{
      await window.storage.set("gin_custom_db",JSON.stringify(newCustom));
      await window.storage.set("gin_remote_db_version",updateData.version);
    }catch(e){}
    setUpdateBanner(null);
  },[customDB]);

  const saveStock=useCallback(async(ns)=>{
    setStock(ns);
    try{await window.storage.set("gin_stock",JSON.stringify(ns));}catch(e){}
    setShowStockModal(false);
  },[]);

  const saveCustomDB=useCallback(async(newCustom)=>{
    setCustomDB(newCustom);
    try{await window.storage.set("gin_custom_db",JSON.stringify(newCustom));}catch(e){}
    setShowAdminModal(false);
  },[]);

  // ── Recipe CRUD ─────────────────────────────────────────────────────────────
  const saveRecipe = useCallback(async(name)=>{
    const recipe = {
      id: Date.now().toString(),
      name: name||recipeName||("Receita "+new Date().toLocaleDateString("pt-BR")),
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString(),
      mode,
      grams: Object.fromEntries(Object.entries(grams).filter(([,v])=>parseFloat(v)>0)),
      fruitParams: Object.fromEntries(Object.entries(fruitParams).filter(([k])=>Object.keys(grams).includes(k))),
      results,
    };
    const updated = [...savedRecipes.filter(r=>r.id!==recipe.id), recipe];
    setSavedRecipes(updated);
    try{await window.storage.set("gin_recipes", JSON.stringify(updated));}catch(e){}
    return recipe;
  },[recipeName,mode,grams,fruitParams,results,savedRecipes]);

  const loadRecipe = useCallback((recipe)=>{
    setRecipeName(recipe.name);
    setMode(recipe.mode||"gin");
    setGrams(p=>({...p,...recipe.grams}));
    setFruitParams(recipe.fruitParams||{});
    if(recipe.results) setResults(recipe.results);
    setStep(recipe.results?"results":"input");
    setShowRecipeManager(false);
  },[]);

  const deleteRecipe = useCallback(async(id)=>{
    const updated = savedRecipes.filter(r=>r.id!==id);
    setSavedRecipes(updated);
    try{await window.storage.set("gin_recipes", JSON.stringify(updated));}catch(e){}
  },[savedRecipes]);

  const exportRecipesJSON = ()=>{
    const blob=new Blob([JSON.stringify({version:"1.0",recipes:savedRecipes},null,2)],{type:"application/json"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=`gin-lab-receitas-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
  };

  const importRecipesJSON = async(file)=>{
    const text=await file.text();
    try{
      const parsed=JSON.parse(text);
      const incoming=parsed.recipes||parsed;
      if(!Array.isArray(incoming)) return;
      const merged=[...savedRecipes];
      incoming.forEach(r=>{ if(!merged.find(x=>x.id===r.id)) merged.push(r); });
      setSavedRecipes(merged);
      await window.storage.set("gin_recipes",JSON.stringify(merged));
    }catch(e){alert("Erro ao importar receitas: "+e.message);}
  };

  // ── GitHub sync: push recipes.json ─────────────────────────────────────────
  // Para sincronizar receitas entre dispositivos, exporte o JSON e commite em:
  // /recipes.json no mesmo repositório do botanicals.json
  const syncRecipesFromGithub = useCallback(async()=>{
    if(!GITHUB_RAW_URL) return;
    const url=GITHUB_RAW_URL.replace("botanicals.json","recipes.json");
    try{
      const res=await fetch(url+"?t="+Date.now());
      if(!res.ok) return;
      const parsed=await res.json();
      const incoming=parsed.recipes||[];
      const merged=[...savedRecipes];
      incoming.forEach(r=>{ if(!merged.find(x=>x.id===r.id)) merged.push(r); });
      setSavedRecipes(merged);
      await window.storage.set("gin_recipes",JSON.stringify(merged));
    }catch(e){}
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[savedRecipes]);

  const allBotanicals=useMemo(()=>{
    const all={...BOTANICALS_DB};
    Object.entries(customDB).forEach(([name,d])=>{ if(d.botData) all[name]=d.botData; });
    Object.entries(stock).forEach(([name,s])=>{if(s.botData&&!all[name])all[name]=s.botData;});
    return all;
  },[stock,customDB]);

  const resolvedBotanicals=useMemo(()=>{
    const res={};
    Object.entries(allBotanicals).forEach(([name,info])=>{
      const s=stock[name]||{};
      const compounds=info.compounds.map(c=>{
        const ov=s.hasReport&&s.compounds?.[c.name];
        return ov!==undefined?{...c,conc:parseFloat(ov)}:c;
      });
      res[name]={...info,compounds,hasReport:s.hasReport,inStock:s.inStock};
    });
    return res;
  },[allBotanicals,stock]);

  const stockedBots=useMemo(()=>Object.keys(allBotanicals).filter(n=>stock[n]?.inStock),[allBotanicals,stock]);
  const stockCount=stockedBots.length;

  useEffect(()=>{
    setGrams(p=>{const next={...p};Object.keys(allBotanicals).forEach(k=>{if(!(k in next))next[k]="";});return next;});
  },[allBotanicals]);

  // Which bots need Brix/pH fields (cocktail mode + right category + has quantity)
  const needsBrixPh=useMemo(()=>{
    if(mode!=="cocktail")return[];
    return Object.keys(allBotanicals).filter(name=>{
      const info=allBotanicals[name];
      return CATS_WITH_BRIX_PH.includes(info.category)&&parseFloat(grams[name])>0;
    });
  },[mode,allBotanicals,grams]);

  const visibleBots=useMemo(()=>{
    const base=showAll?Object.keys(allBotanicals):(stockCount>0?stockedBots:Object.keys(allBotanicals));
    return base.filter(name=>{
      const info=allBotanicals[name];
      const s=search.toLowerCase();
      const matchS=!s||name.toLowerCase().includes(s)||info.compounds.some(c=>c.name.toLowerCase().includes(s));
      const matchC=activeCat==="Todos"||(info.category===activeCat);
      return matchS&&matchC;
    });
  },[allBotanicals,stockedBots,stockCount,showAll,search,activeCat]);

  const activeCount=Object.values(grams).filter(v=>parseFloat(v)>0).length;
  const allCategories=["Todos",...new Set(Object.values(allBotanicals).map(b=>b.category))];

  const compute=()=>{
    const aromas={},table=[];
    const extractFactors=EXTRACTION[mode];

    Object.entries(resolvedBotanicals).forEach(([bot,info])=>{
      const g=parseFloat(grams[bot])||0;if(!g)return;
      const cat=info.category||"Base";
      const extractFactor=extractFactors[cat]||1.0;

      // Brix/pH factors for cocktail mode
      const fp=fruitParams[bot]||{};
      const defaults=DEFAULT_BRIX_PH[bot]||{};
      const brixVal=fp.brix!==""&&fp.brix!==undefined?parseFloat(fp.brix):(defaults.brix??null);
      const phVal=fp.ph!==""&&fp.ph!==undefined?parseFloat(fp.ph):(defaults.ph??null);
      const bxF=mode==="cocktail"&&CATS_WITH_BRIX_PH.includes(cat)?brixFactor(brixVal):1.0;

      info.compounds.forEach(c=>{
        // Destilação remove compostos não voláteis no modo gin
        if(mode==="gin"&&DISTILLATION_REMOVED.has(c.name))return;

        const phF=mode==="cocktail"&&CATS_WITH_BRIX_PH.includes(cat)?phFactor(phVal,c.aroma):1.0;
        const mgL=(c.conc/100)*g*10*extractFactor*bxF*phF;
        const thr=(c.min+c.max)/2;
        const intensity=thr>0?Math.log10(1+mgL/thr)/Math.log10(101):0;
        aromas[c.aroma]=(aromas[c.aroma]||0)+intensity;
        table.push({bot,compound:c.name,conc:c.conc,mgL:mgL.toFixed(5),aroma:c.aroma,
          threshold:`${c.min}–${c.max}`,intensity:Math.min(intensity,1).toFixed(4),
          source:info.hasReport&&stock[bot]?.compounds?.[c.name]!==undefined?"laudo":"literatura",
          extractFactor,bxF:bxF.toFixed(2),phF:phF.toFixed(2)});
      });
    });

    const mx=Math.max(...Object.values(aromas),0.001);
    const norm=Object.fromEntries(Object.entries(aromas).map(([k,v])=>[k,Math.min(v/mx,1)]));
    setResults({aromas:norm,table:table.sort((a,b)=>parseFloat(b.intensity)-parseFloat(a.intensity)),mode});
    setStep("results");
  };

  if(!stockLoaded)return(
    <div style={{minHeight:"100vh",background:"#060c06",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Mono',monospace",color:"#305030",fontSize:12,letterSpacing:2}}>
      CARREGANDO ESTOQUE...
    </div>
  );

  const isCocktail=mode==="cocktail";

  return(
    <div style={{minHeight:"100vh",background:isCocktail?"linear-gradient(135deg,#0c0614 0%,#180c22 60%,#0d0816 100%)":"linear-gradient(135deg,#060c06 0%,#0c180c 60%,#060c09 100%)",fontFamily:"'DM Mono','Courier New',monospace",color:"#e0f0e0",transition:"background 0.5s"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@700&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#060c06}::-webkit-scrollbar-thumb{background:#254525;border-radius:2px}
        input[type=number]{-moz-appearance:textfield;background:#091409;border:1px solid #1c381c;color:#a0da60;padding:5px 8px;border-radius:6px;font-family:'DM Mono',monospace;font-size:13px;width:76px;outline:none;transition:border-color 0.2s}
        input[type=number]:focus{border-color:#6aad3a;box-shadow:0 0 0 2px rgba(106,173,58,0.12)}
        input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
        .si{background:#091409;border:1px solid #1c381c;color:#a0da60;padding:8px 12px 8px 36px;border-radius:8px;font-family:'DM Mono',monospace;font-size:12px;width:100%;outline:none}
        .si::placeholder{color:#274527}
        .pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;letter-spacing:0.5px}
        .cb{background:transparent;border:1px solid #1c381c;color:#3f6f3f;padding:4px 11px;border-radius:18px;cursor:pointer;font-family:'DM Mono',monospace;font-size:10px;transition:all 0.18s;white-space:nowrap}
        .cb:hover{border-color:#5a9a3a;color:#90d060}.cb.on{background:#132813;border-color:#5a9a3a;color:#a0da60}
        .btn{background:linear-gradient(135deg,#1c4a0c,#12300a);border:1px solid #3a7a1a;color:#a0da60;padding:10px 26px;border-radius:8px;cursor:pointer;font-family:'DM Mono',monospace;font-size:13px;letter-spacing:1px;text-transform:uppercase;transition:all 0.2s}
        .btn:hover{background:linear-gradient(135deg,#2a5a18,#1c4a0c);transform:translateY(-1px);box-shadow:0 4px 14px rgba(100,170,50,0.18)}
        .btn:disabled{opacity:0.3;cursor:not-allowed;transform:none;box-shadow:none}
        .bc{background:rgba(7,16,7,0.85);border:1px solid #162a16;border-radius:10px;padding:11px 14px;display:flex;align-items:center;gap:10px;transition:all 0.18s}
        .bc:hover{border-color:#274527}.bc.on{border-color:#385a18;background:rgba(9,20,7,0.95)}
        table{border-collapse:collapse;width:100%;font-size:11px}
        th{background:#050e05;color:#5a9a3a;padding:8px 10px;text-align:left;letter-spacing:0.8px;border-bottom:1px solid #122212;font-size:9px;text-transform:uppercase}
        td{padding:6px 10px;border-bottom:1px solid #0b1b0b;color:#88b880;vertical-align:middle}
        tr:hover td{background:rgba(160,218,96,0.025)}
        .mode-btn{border:1px solid;border-radius:10px;cursor:pointer;font-family:'DM Mono',monospace;font-size:12px;padding:8px 20px;letter-spacing:0.5px;transition:all 0.25s;display:flex;align-items:center;gap:8px}
      `}</style>

      {showStockModal&&<StockModal stock={stock} onSave={saveStock} onClose={()=>setShowStockModal(false)}/>}
      {showAdminModal&&<AdminPanel customDB={customDB} onUpdateDB={saveCustomDB} onClose={()=>setShowAdminModal(false)}/>}
      {showRecipeManager&&<RecipeManager recipes={savedRecipes} onLoad={loadRecipe} onDelete={deleteRecipe} onExport={exportRecipesJSON} onImport={importRecipesJSON} onClose={()=>setShowRecipeManager(false)}/>}
      {showPdfModal&&results&&<PdfModal recipe={{name:recipeName,grams,fruitParams,results}} allBotanicals={allBotanicals} mode={mode} onClose={()=>setShowPdfModal(false)}/>}

      {/* GitHub update banner */}
      {updateBanner&&(
        <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:500,background:"linear-gradient(135deg,#0a1e30,#060e1a)",border:"1px solid #2a5a8a",borderRadius:"12px 12px 0 0",padding:"12px 20px",display:"flex",alignItems:"center",gap:12,fontFamily:"'DM Mono',monospace",boxShadow:"0 -4px 24px rgba(0,100,200,0.15)"}}>
          <span style={{fontSize:20}}>🔄</span>
          <div style={{flex:1}}>
            <div style={{fontSize:12,color:"#80c0f0",fontWeight:500}}>Nova versão do banco disponível — v{updateBanner.version}</div>
            <div style={{fontSize:9,color:"#3a6a9a",marginTop:2}}>
              {updateBanner.count} novos botânicos · {updateBanner.total} total{updateBanner.notes&&` · ${updateBanner.notes}`}
            </div>
          </div>
          <button onClick={()=>applyGithubUpdate(updateBanner.data)}
            style={{background:"linear-gradient(135deg,#1a4a7a,#0e2a4a)",border:"1px solid #3a7aaa",color:"#80c0f0",padding:"7px 18px",borderRadius:8,cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11,letterSpacing:0.5}}>
            ⬇ Atualizar
          </button>
          <button onClick={()=>setUpdateBanner(null)}
            style={{background:"transparent",border:"none",color:"#305060",fontSize:18,cursor:"pointer"}}>✕</button>
        </div>
      )}

      {/* HEADER */}
      <div style={{borderBottom:`1px solid ${isCocktail?"#261840":"#101e10"}`,padding:"16px 28px",background:isCocktail?"rgba(12,6,22,0.92)":"rgba(5,10,5,0.9)",backdropFilter:"blur(12px)",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <span style={{fontSize:24}}>{isCocktail?"🍹":"🌿"}</span>
          <div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:19,fontWeight:700,color:isCocktail?"#c4a0e8":"#a0da60"}}>
              {isCocktail?"Cocktail Aromatics Lab":"Gin Aromatics Lab"}
            </div>
            <div style={{fontSize:9,color:isCocktail?"#4a2870":"#305030",marginTop:1,letterSpacing:2,textTransform:"uppercase"}}>
              {Object.keys(allBotanicals).length} botânicos · compostos voláteis · perfil aromático
            </div>
          </div>
          <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            {/* Recipe name input */}
            <div style={{position:"relative",display:"flex",alignItems:"center"}}>
              <span style={{position:"absolute",left:9,fontSize:11,color:isCocktail?"#5a3090":"#305030",pointerEvents:"none"}}>📝</span>
              <input type="text" value={recipeName} onChange={e=>setRecipeName(e.target.value)}
                placeholder="Nome da receita..."
                style={{background:isCocktail?"rgba(20,8,40,0.8)":"rgba(5,14,5,0.8)",border:`1px solid ${isCocktail?"#3a1860":"#1a3a1a"}`,
                  color:isCocktail?"#c4a0e8":"#a0da60",padding:"6px 10px 6px 28px",borderRadius:8,
                  fontFamily:"'DM Mono',monospace",fontSize:11,width:180,outline:"none"}}/>
            </div>
            {activeCount>0&&<span style={{fontSize:10,color:isCocktail?"#9a6ad4":"#6aad3a",background:isCocktail?"#140828":"#091409",border:`1px solid ${isCocktail?"#3a1860":"#254525"}`,padding:"4px 10px",borderRadius:18}}>{activeCount} bot.</span>}
            {/* Recipes button */}
            <button onClick={()=>setShowRecipeManager(true)}

                            <div style={{height:"100%",width:`${Math.min(parseFloat(row.intensity)*100,100)}%`,background:AROMA_COLORS[row.aroma]||"#a0da60",borderRadius:2}}/>
                          </div>
                          <span style={{color:"#305030",fontSize:10}}>{row.intensity}</span>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          <div style={{marginTop:16,padding:"10px 14px",background:"rgba(5,12,5,0.6)",border:"1px solid #0e220e",borderRadius:8,fontSize:9,color:"#254525",lineHeight:2}}>
            <strong style={{color:"#3a7a3a"}}>METODOLOGIA —</strong>
            {results.mode==="cocktail"?(
              <> Coquetel: conc.% × g/L × 10 × fator_extração × fator_Brix × fator_pH = mg/L estimado.
              Brix modela ancoragem de voláteis na matriz de açúcares [f=1/(1+Brix/100×0.8)].
              pH modula percepção de aromas ácidos e florais centrado em pH 3.5.
              Compostos não voláteis (ácidos orgânicos, antocianinas, taninos) incluídos.
              Fatores de extração por categoria: Frutas ×2.2, Flores ×1.4, Ervas ×1.1. 📄 = laudo GC-MS. 📊 = literatura.</>
            ):(
              <> Gin/Destilado: conc.% × g/L × 10 × fator_extração = mg/L. Compostos não voláteis removidos pela destilação.
              Intensidade via log₁₀ relativo ao limiar médio (min+max)/2. 📄 = laudo GC-MS. 📊 = literatura.</>
            )}
          </div>
        </div>
      )}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
